name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Inject password into protected.html
      run: |
        sed -i 's/{{ PROTECTED_PASSWORD }}/${{ secrets.PROTECTED_PASSWORD }}/g' protected.html
    
    - name: Create publish directory with only site files
      run: |
        mkdir -p publish
        cp index.html publish/
        cp style.css publish/
        cp protected.html publish/
        cp service-agreement.html publish/
        cp privacy-policy.html publish/
        cp favicon.ico publish/
        cp CNAME publish/
        touch publish/.nojekyll
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish
